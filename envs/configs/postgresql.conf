# -----------------------------
# PostgreSQL Configuration
# -----------------------------
# Optimized for 32GB RAM / 4 vCPU
# Tuned for analytical workloads with SSD storage
#
# For full list of parameters and documentation:
# https://www.postgresql.org/docs/current/runtime-config.html

#------------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
#------------------------------------------------------------------------------

listen_addresses = '*'
max_connections = 50

#------------------------------------------------------------------------------
# RESOURCE USAGE
#------------------------------------------------------------------------------

# Memory
shared_buffers = 8GB                    # 25% of total RAM
work_mem = 512MB                        # per operation, with 50 connections
maintenance_work_mem = 2GB              # for VACUUM, CREATE INDEX, etc.
effective_cache_size = 24GB             # 75% of RAM (helps query planner)

# Parallelism
max_worker_processes = 8                # background workers
max_parallel_workers = 4                # match vCPU count
max_parallel_workers_per_gather = 4     # parallel query execution
max_parallel_maintenance_workers = 4    # parallel index builds

# I/O
effective_io_concurrency = 200          # for SSD storage
dynamic_shared_memory_type = posix

#------------------------------------------------------------------------------
# WRITE-AHEAD LOG
#------------------------------------------------------------------------------

max_wal_size = 4GB                      # increased for better write performance
min_wal_size = 1GB

#------------------------------------------------------------------------------
# QUERY TUNING
#------------------------------------------------------------------------------

random_page_cost = 1.1                  # lower for SSD storage (default 4.0)

#------------------------------------------------------------------------------
# AUTOVACUUM
#------------------------------------------------------------------------------

autovacuum_max_workers = 4              # match vCPU count

#------------------------------------------------------------------------------
# CLIENT CONNECTION DEFAULTS
#------------------------------------------------------------------------------

# Locale and Formatting
datestyle = 'iso, mdy'
timezone = 'Etc/UTC'
lc_messages = C
lc_monetary = C
lc_numeric = C
lc_time = C
default_text_search_config = 'pg_catalog.english'

# Logging
log_timezone = 'Etc/UTC'
