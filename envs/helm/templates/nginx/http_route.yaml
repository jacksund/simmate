{{- if or (eq .Values.platform "digitalocean") (eq .Values.platform "aws") }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: simmate-nginx-route
spec:
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway-system
  hostnames:
    - {{ .Values.nginx.hostname }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: simmate-nginx-service
          port: 80
{{- end }}