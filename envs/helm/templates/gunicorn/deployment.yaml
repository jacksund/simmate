apiVersion: apps/v1
kind: Deployment
metadata:
  name: simmate-gunicorn-deployment
  labels:
    app: simmate-gunicorn
spec:
  selector:
    matchLabels:
      app: simmate-gunicorn
  replicas: 1
  template:
    metadata:
      labels:
        app: simmate-gunicorn
        # bug-fix: https://stackoverflow.com/questions/46336852/
        date: "{{ now | unixEpoch }}"
    spec:
      containers:
        - name: simmate-gunicorn
          image: jacksund/simmate:dev
          env:
            {{- include "simmate.env_config" . | indent 12 }}
          ports:
            - containerPort: 8000
          volumeMounts:
            - mountPath: /staticfiles
              name: simmate-gunicorn-staticfiles
          resources:
            requests:
              memory: {{ .Values.gunicorn.resources.requests.memory }}
              cpu: {{ .Values.gunicorn.resources.requests.cpu }}
              ephemeral-storage: {{ .Values.gunicorn.resources.requests.ephemeral }}
            limits:
              memory: {{ .Values.gunicorn.resources.limits.memory }}
              cpu: {{ .Values.gunicorn.resources.limits.cpu }}
              ephemeral-storage: {{ .Values.gunicorn.resources.limits.ephemeral }}
      volumes:
        - name: simmate-gunicorn-staticfiles
          persistentVolumeClaim:
            claimName: simmate-gunicorn-staticfiles