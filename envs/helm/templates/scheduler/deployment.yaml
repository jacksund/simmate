apiVersion: apps/v1
kind: Deployment
metadata:
  name: simmate-scheduler-deployment
  labels:
    app: simmate-scheduler
spec:
  selector:
    matchLabels:
      app: simmate-scheduler
  replicas: 1
  template:
    metadata:
      labels:
        app: simmate-scheduler
        # bug-fix: https://stackoverflow.com/questions/46336852/
        date: "{{ now | unixEpoch }}"
    spec:
      containers:
        - name: simmate-scheduler
          image: jacksund/simmate:{{ .Values.version }}
          imagePullPolicy: Always
          command: ["simmate", "compute", "start-schedules"]
          env:
            {{- include "simmate.env_config" . | indent 12 }}
          resources:
            requests:
              memory: {{ .Values.scheduler.memory.request }}
              cpu: {{ .Values.scheduler.cpu.request }}
              ephemeral-storage: {{ .Values.scheduler.ephemeral.request }}
            limits:
              memory: {{ .Values.scheduler.memory.limit }}
              cpu: {{ .Values.scheduler.cpu.limit }}
              ephemeral-storage: {{ .Values.scheduler.ephemeral.limit }}
