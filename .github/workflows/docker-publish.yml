
# This action builds a Docker image and then publishes it to DockerHub.
# See the guide at...
# https://docs.github.com/en/actions/publishing-packages/publishing-docker-images

name: Publish Docker Images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      custom_tag:
        description: 'Custom tag for the images (e.g., dev). If left blank, defaults to the branch name.'
        required: false
        type: string

jobs:
  push_to_registry:
    name: Publish to DockerHub
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        image-name: ["bader", "nginx", "psi4", "quantum_espresso", "simmate", "simmate-worker"]

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      
      - name: Log in to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to the Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: |
            jacksund/${{ matrix.image-name }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=raw,value=${{ inputs.custom_tag }},enable=${{ inputs.custom_tag != '' }}
      
      - name: Build and push Docker images
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: ./envs/docker/${{ matrix.image-name }}.dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
